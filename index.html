<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Price Checker</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px;
        }
        #reader { 
            width: 80%;
            max-width: 400px;
            margin: 20px auto; 
            border: 2px dashed #ccc;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #result { 
            font-size: 1.5em; 
            font-weight: bold; 
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .permission-note {
            color: #d32f2f;
            font-size: 0.9em;
            margin-top: 10px;
        }
        button {
            padding: 12px 25px;
            font-size: 1.1em;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Scan a Barcode</h1>
    <p>Point your camera at a product barcode</p>
    
    <div id="reader">
        <p id="scanner-status">Loading scanner...</p>
    </div>
    
    <div id="result"></div>
    <p class="permission-note">If camera doesn't appear, check browser permissions</p>
    <button id="retry-button" style="display:none;">Enable Camera</button>

    <!-- Use specific version of scanner library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
